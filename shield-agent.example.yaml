# shield-agent example configuration
# Copy this file to shield-agent.yaml and adjust values as needed.
# All values shown here are the defaults.
#
# Environment variable overrides use the SHIELD_AGENT_ prefix, e.g.:
#   SHIELD_AGENT_LOG_LEVEL=debug
#   SHIELD_AGENT_SECURITY_MODE=closed

server:
  # Address for the monitoring HTTP server (/healthz, /metrics).
  monitor_addr: "127.0.0.1:9090"

  # TLS certificate and key files. When both are set, the proxy listens over HTTPS.
  # tls_cert: "/path/to/cert.pem"
  # tls_key: "/path/to/key.pem"

  # CORS allowed origins. Use ["*"] to allow all origins (default).
  # Set to specific origins to restrict access, e.g.:
  #   cors_allowed_origins:
  #     - "https://myapp.example.com"
  cors_allowed_origins:
    - "*"

security:
  # Mode controls what happens when authentication fails.
  #   open   — log a warning but allow the request through (observation mode)
  #   closed — reject requests that fail authentication
  mode: "open"

  # Path to the YAML file containing allowed agent public keys.
  key_store_path: "keys.yaml"

logging:
  # Log verbosity level: debug | info | warn | error
  level: "info"

  # Log output format: json | text
  format: "json"

telemetry:
  # Set to true to send anonymous usage statistics.
  # No message content is ever collected.
  enabled: false

  # URL of the telemetry ingestion endpoint.
  endpoint: "http://localhost:8080"

  # How often (in seconds) to flush the local telemetry buffer.
  batch_interval: 60

  # Differential privacy epsilon parameter (higher = less noise, lower = more privacy).
  epsilon: 1.0

storage:
  # Path to the SQLite database used to store action logs.
  db_path: "shield-agent.db"

  # Number of days to retain log records before automatic deletion.
  retention_days: 30

# Middleware pipeline configuration.
# Middlewares run in the order listed. Omitting this section uses the defaults (auth, guard, then log).
middlewares:
  - name: auth
    enabled: true
  - name: guard
    enabled: true
    config:
      # Maximum requests per minute per JSON-RPC method (0 = unlimited).
      rate_limit_per_min: 0
      # Maximum request body size in bytes (0 = unlimited).
      max_body_size: 0
      # List of CIDR ranges or IPs to block outright.
      # ip_blocklist:
      #   - "203.0.113.0/24"
      # List of CIDR ranges or IPs to allow (empty = allow all).
      # ip_allowlist:
      #   - "10.0.0.0/8"
      # Brute force protection: auto-block after N consecutive failures (0 = disabled).
      # brute_force_max_fails: 5
      # Validate JSON-RPC structure (reject malformed payloads).
      # validate_jsonrpc: true
  - name: log
    enabled: true

# -----------------------------------------------------------------------------
# Egress forward-proxy (Phase 1: metadata-only)
# -----------------------------------------------------------------------------
# When enabled, shield-agent runs a forward HTTP proxy that captures outbound
# agent traffic. Phase 1 performs CONNECT tunneling with metadata-only capture
# (destination, timing, byte counts). TLS bodies are NEVER decrypted in this
# phase — set egress.mitm_hosts (Phase 2) to opt in per-host TLS MITM.
#
# Run in one of two ways:
#   1) Dedicated process:   shield-agent egress --listen :8889
#   2) Alongside ingress:   shield-agent proxy --with-egress
#
# Rollback note: if you downgrade to a shield-agent version that predates the
# egress feature, remove this whole "egress:" section first — older binaries
# reject unknown YAML fields.
#
# egress:
#   enabled: false
#   listen: ":8889"
#
#   # Empty upstream_allow means "allow all, still log". Non-empty switches
#   # the policy middleware into enforcement mode.
#   upstream_allow:
#     - "api.openai.com"
#     - "api.anthropic.com"
#     - "generativelanguage.googleapis.com"
#
#   # policy_mode: "warn" records violations and lets them through.
#   #              "block" rejects violations with HTTP 403 and, on log-write
#   #                      failure, returns 503 (fail-closed for compliance).
#   policy_mode: "warn"
#
#   # Data retention. 0 means fall back to storage.retention_days.
#   retention_days: 1095  # 3 years (recommended for EU AI Act / Korea AI Act)
#
#   # Tamper-evident audit log. "shield-agent logs --verify" walks the chain.
#   hash_chain:
#     enabled: true
#     algorithm: "sha256"  # Phase 1 only supports sha256
#
#   middlewares:
#     - name: policy
#       enabled: true
#     - name: egress_log
#       enabled: true
#
#   # -------------------- Phase 2 (MITM + deep inspection) --------------------
#   # These fields are schema-only in Phase 1. Engaging them requires a CA
#   # certificate and legal review for the jurisdiction you operate in.
#   mitm_hosts: []                 # per-host opt-in for TLS MITM
#   tls_passthrough_hosts: []      # force CONNECT-only for these hosts
#   ca_cert: ""
#   ca_key: ""
#   ca_auto_generate: true
#   ca_validity_days: 3650
#   leaf_cache_ttl_min: 60
#   pii_scrub:
#     enabled: true
#     redaction_mode: "mask"
#   content_tagging:
#     enabled: true
#     inject_header: false
#   log_full_body: false
